<html>
  <head></head>
  <body>
    <form name="abuse-report" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="abuse-report" />
      <input type="hidden" name="report-timestamp" />
      <input type="hidden" name="report-type" />
      <!-- Contact Info -->
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="discord-id" />
      <!-- DDoS Fields -->
      <input type="text" name="ddos-target" />
      <input type="text" name="ddos-start-time" />
      <input type="text" name="ddos-service-type" />
      <textarea name="ddos-symptoms"></textarea>
      <textarea name="ddos-evidence"></textarea>
      <textarea name="ddos-additional-details"></textarea>
      <!-- DMCA Fields -->
      <input type="text" name="dmca-organization" />
      <input type="text" name="dmca-is-owner" />
      <input type="text" name="dmca-work-title" />
      <input type="text" name="dmca-content-type" />
      <input type="url" name="dmca-original-url" />
      <input type="url" name="dmca-infringing-url" />
    </form>
  </body>
</html>
